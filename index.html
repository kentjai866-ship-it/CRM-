function log(msg, type='info') {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${type}">${msg}</div>`;
}

function setProgress(pct) {
  document.getElementById('bar').style.width = pct + '%';
}

async function start() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Bezig met toevoegen…';
  document.getElementById('log').innerHTML = '';

  let success = 0;
  for(let i = 0; i < leads.length; i++) {
    const lead = leads[i];
    log(`⏳ ${lead.company} toevoegen…`);
    try {
      const res = await fetch(`${SUPA_URL}/rest/v1/clients`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPA_KEY,
          'Authorization': `Bearer ${SUPA_KEY}`,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify(lead)
      });
      if(res.ok) {
        log(`✓ ${lead.company} toegevoegd`, 'ok');
        success++;
      } else {
        const err = await res.text();
        log(`✗ ${lead.company}: ${err}`, 'err');
      }
    } catch(e) {
      log(`✗ ${lead.company}: ${e.message}`, 'err');
    }
    setProgress(((i+1) / leads.length) * 100);
    await new Promise(r => setTimeout(r, 300));
  }

  btn.textContent = `Klaar — ${success}/${leads.length} toegevoegd`;
  if(success === leads.length) {
    document.getElementById('done').style.display = 'block';
  }
}
